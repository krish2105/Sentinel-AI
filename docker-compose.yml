# One-command local dev: Postgres+pgvector + Sentinel backend.
# The frontend runs separately (cd frontend && npm run dev).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@db:5432/sentinel
      CORS_ORIGINS: http://localhost:3000
      # Optional: add a free Groq key for real LLM attacks. Blank => mock engine.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENABLE_HEAVY_ML: ${ENABLE_HEAVY_ML:-false}
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.rag.ingest &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests & evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run test suite
        env:
          FORCE_MOCK_LLM: "true"
          ENABLE_HEAVY_ML: "false"
        run: python -m pytest -q
      - name: Run eval harnesses
        env:
          FORCE_MOCK_LLM: "true"
        run: |
          python -m app.rag.ingest
          python -m app.ml.eval_classifier
          python -m evals.guardrail_ab
          python -m evals.judge_eval
          python -m evals.rag_eval

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

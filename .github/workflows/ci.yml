name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests & evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run test suite
        env:
          FORCE_MOCK_LLM: "true"
          ENABLE_HEAVY_ML: "false"
        run: python -m pytest -q
      - name: Run eval harnesses
        env:
          FORCE_MOCK_LLM: "true"
        run: |
          python -m app.rag.ingest
          python -m app.ml.eval_classifier
          python -m evals.guardrail_ab
          python -m evals.judge_eval
          python -m evals.rag_eval

  frontend:
    name: Frontend — typecheck, unit tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    name: E2E — Playwright happy-path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend (mock engine)
        working-directory: backend
        env:
          FORCE_MOCK_LLM: "true"
          ENABLE_HEAVY_ML: "false"
        run: |
          nohup uvicorn app.main:app --port 8000 --log-level warning &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 1
          done
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
      - name: Run E2E
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
